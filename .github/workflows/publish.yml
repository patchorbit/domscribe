name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # Required for OIDC trusted publishing
  contents: write # Required for creating GitHub Releases

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: npx nx run-many -t lint test build typecheck --exclude domscribe-test-fixtures

  publish:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: npx nx run-many -t build --exclude domscribe-test-fixtures

      - name: Sync dist
        run: npx nx run-many -t sync-dist

      - name: Publish to npm
        run: npx nx release publish --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Build Gemini extension archive
        run: |
          mkdir -p tmp/gemini-archive
          cp gemini-extension.json tmp/gemini-archive/
          cp -r skills tmp/gemini-archive/ 2>/dev/null || true
          tar -czf tmp/domscribe-gemini-extension.tar.gz -C tmp/gemini-archive .

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            tmp/domscribe-gemini-extension.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
